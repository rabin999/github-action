name: 02 - Workflow Events

on: 
    push:
    pull_request:
    schedule:
        - cron: '*/5 * * * *'
    workflow_dispatch:

jobs:
    echo:
        runs-on: ubuntu-latest
        steps: 
            - name: Show the trigger
              run: | 
                echo "I've been triggered by a(n) ${{ github.event_name }}"
                echo "detail -> ${{ github.action_path }}"
                pwd
                ls -lat
                echo "detail -> ${{ toJSON(github) }}"
                echo "detail -> ${{ github.env }}"
                echo "detail -> ${{ github.repository }}"